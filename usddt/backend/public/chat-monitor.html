<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前后端联调实时监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            height: calc(100vh - 200px);
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 16px;
        }

        .avatar.frontend {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .avatar.backend {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .message-info {
            flex: 1;
        }

        .sender-name {
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
        }

        .timestamp {
            font-size: 12px;
            color: #718096;
        }

        .message-content {
            margin-left: 50px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            line-height: 1.6;
            color: #2d3748;
        }

        .message-content pre {
            background: #f7fafc;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
            border-left: 3px solid #667eea;
        }

        .message-content code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
        }

        .controls {
            padding: 15px 30px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            font-size: 14px;
            color: #4a5568;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 前后端联调实时监控</h1>
            <div class="status">
                <div class="status-dot"></div>
                <span>实时监控中</span>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <p>等待前后端消息...</p>
                <p style="font-size: 12px; margin-top: 10px;">消息将自动显示在这里</p>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="loadMessages()">🔄 刷新消息</button>
            <button class="btn btn-secondary" onclick="clearMessages()">🗑️ 清空记录</button>
            <div class="auto-refresh">
                <input type="checkbox" id="autoRefresh" checked onchange="toggleAutoRefresh()">
                <label for="autoRefresh">自动刷新 (每5秒)</label>
            </div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        let lastMessageCount = 0;

        function loadMessages() {
            fetch('/api/chat-messages')
                .then(res => res.json())
                .then(messages => {
                    renderMessages(messages);
                    console.log(`✅ 已加载 ${messages.length} 条消息`);
                })
                .catch(err => {
                    console.error('❌ 加载消息失败:', err);
                });
        }

        function renderMessages(messages) {
            const container = document.getElementById('chatContainer');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <p>等待前后端消息...</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message">
                    <div class="message-header">
                        <div class="avatar ${msg.sender}">
                            ${msg.sender === 'frontend' ? '前' : '后'}
                        </div>
                        <div class="message-info">
                            <div class="sender-name">${msg.senderName}</div>
                            <div class="timestamp">${formatTime(msg.timestamp)}</div>
                        </div>
                    </div>
                    <div class="message-content">
                        ${renderMarkdown(msg.content)}
                    </div>
                </div>
            `).join('');

            // 滚动到底部
            container.scrollTop = container.scrollHeight;
            lastMessageCount = messages.length;
        }

        function renderMarkdown(text) {
            // 简单的 Markdown 渲染
            let html = text
                .replace(/### (.+)/g, '<h3>$1</h3>')
                .replace(/## (.+)/g, '<h2>$1</h2>')
                .replace(/# (.+)/g, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\n/g, '<br>');
            
            return html;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function clearMessages() {
            if (confirm('确定要清空所有消息记录吗？')) {
                document.getElementById('chatContainer').innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <p>消息已清空</p>
                    </div>
                `;
            }
        }

        function toggleAutoRefresh() {
            const checkbox = document.getElementById('autoRefresh');
            if (checkbox.checked) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        function startAutoRefresh() {
            if (!autoRefreshInterval) {
                autoRefreshInterval = setInterval(() => {
                    loadMessages();
                }, 5000);
            }
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        // 初始化
        window.onload = () => {
            loadMessages();
            startAutoRefresh();
        };
    </script>
</body>
</html>
