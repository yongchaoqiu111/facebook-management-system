<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员充值</title>
<style>
body { font-family: Arial; padding: 20px; max-width: 400px; margin: 0 auto; }
input { width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; box-sizing: border-box; }
button { width: 100%; padding: 12px; background: #1890ff; color: white; border: none; font-size: 16px; cursor: pointer; border-radius: 4px; }
button:hover { background: #40a9ff; }
#result { margin-top: 20px; padding: 10px; }
</style>
</head>
<body>
<h2>管理员充值</h2>
<input type="text" id="userId" placeholder="会员ID">
<input type="number" id="amount" placeholder="充值金额">
<button onclick="recharge()">充值</button>
<div id="result"></div>

<script>
async function recharge() {
  const userId = document.getElementById('userId').value;
  const amount = document.getElementById('amount').value;
  const result = document.getElementById('result');
  
  if (!userId || !amount) {
    result.innerHTML = '<p style="color:red">请填写完整</p>';
    return;
  }
  
  result.innerHTML = '<p>充值中...</p>';
  
  try {
    const res = await fetch('/api/recharge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId: userId,
        amount: parseFloat(amount),
        type: 'recharge',
        reason: '管理员手动充值'
      })
    });
    
    const data = await res.json();
    if (data.success) {
      result.innerHTML = '<p style="color:green">✅ 充值成功！当前余额: ' + data.balance + ' USDT</p>';
    } else {
      result.innerHTML = '<p style="color:red">❌ ' + (data.message || '失败') + '</p>';
    }
  } catch (err) {
    result.innerHTML = '<p style="color:red">❌ 网络错误</p>';
  }
}
</script>
</body>
</html>
