<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram媒体下载</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: #3897f0;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #2684f0;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .media-management {
            display: flex;
            gap: 30px;
            margin: 30px 0;
        }
        .management-column {
            flex: 1;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="app-header"></div>
        
        <main>
            <h2>Instagram媒体下载</h2>
        
        <div class="input-group">
            <label for="username">Instagram用户名</label>
            <input type="text" id="username" placeholder="例如: seeeeeiiiiraaaa" required>
        </div>
        
        <button id="downloadBtn" onclick="startDownload()">开始下载</button>
        
        <div class="media-management">
            <div class="management-column">
                <h3>Instagram媒体管理</h3>
                
                <div class="input-group">
                    <label for="userFolder">选择用户文件夹</label>
                    <select id="userFolder">
                        <option value="">加载中...</option>
                    </select>
                    <button onclick="loadUserFolders()" style="margin-top: 10px;">刷新文件夹列表</button>
                </div>
                
                <button id="moveBtn" onclick="moveFiles()" style="margin-top: 20px;">移动文件到Instagram images目录</button>
                
                <button id="cleanBtn" onclick="cleanImages()" style="margin-top: 10px; background-color: #dc3545;">清理Instagram images目录</button>
            </div>
            
            <div class="management-column">
                <h3>Facebook媒体管理</h3>
                
                <div class="input-group">
                    <label for="facebookUserFolder">选择用户文件夹</label>
                    <select id="facebookUserFolder">
                        <option value="">加载中...</option>
                    </select>
                    <button onclick="loadFacebookUserFolders()" style="margin-top: 10px;">刷新文件夹列表</button>
                </div>
                
                <button id="facebookMoveBtn" onclick="moveFilesToFacebook()" style="margin-top: 20px;">移动文件到Facebook目录</button>
                
                <button id="facebookCleanBtn" onclick="cleanFacebookImages()" style="margin-top: 10px; background-color: #dc3545;">清理Facebook目录</button>
            </div>
        </div>
        
        <div id="status" class="status"></div>
        </main>
    </div>

    <script src="routes.js"></script>
    <script>
        function startDownload() {
            const username = document.getElementById('username').value.trim();
            const downloadBtn = document.getElementById('downloadBtn');
            const status = document.getElementById('status');
            
            if (!username) {
                showStatus('请输入Instagram用户名', 'error');
                return;
            }
            
            downloadBtn.disabled = true;
            downloadBtn.textContent = '下载中...';
            showStatus('正在开始下载任务...', 'info');
            
            fetch('/api/instagram/download', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username: username })
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 0) {
                    showStatus(`下载完成！<br>发现媒体总数: ${data.data.totalFound}<br>成功下载: ${data.data.downloaded}<br>下载失败: ${data.data.failed}<br>跳过文件: ${data.data.skipped}<br>下载目录: ${data.data.downloadDir}`, 'success');
                } else {
                    showStatus(`下载失败: ${data.data.message}`, 'error');
                }
            })
            .catch(error => {
                showStatus(`请求失败: ${error.message}`, 'error');
            })
            .finally(() => {
                downloadBtn.disabled = false;
                downloadBtn.textContent = '开始下载';
            });
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.innerHTML = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }
        
        // 加载用户文件夹列表
        function loadUserFolders() {
            showStatus('正在加载用户文件夹列表...', 'info');
            
            fetch('/api/instagram/user-folders')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('userFolder');
                    select.innerHTML = '<option value="">-- 选择用户文件夹 --</option>';
                    
                    if (data.code === 0 && data.data.folders.length > 0) {
                        data.data.folders.forEach(folder => {
                            const option = document.createElement('option');
                            option.value = folder;
                            option.textContent = folder;
                            select.appendChild(option);
                        });
                        showStatus(`成功加载 ${data.data.folders.length} 个用户文件夹`, 'success');
                    } else {
                        showStatus('未找到用户文件夹', 'info');
                    }
                })
                .catch(error => {
                    showStatus(`加载失败: ${error.message}`, 'error');
                });
        }
        
        // 移动文件到images目录
        function moveFiles() {
            const username = document.getElementById('userFolder').value;
            
            if (!username) {
                showStatus('请选择用户文件夹', 'error');
                return;
            }
            
            const moveBtn = document.getElementById('moveBtn');
            moveBtn.disabled = true;
            moveBtn.textContent = '移动中...';
            showStatus('正在移动文件...', 'info');
            
            fetch('/api/instagram/move-files', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username: username })
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 0) {
                    showStatus(`移动完成！<br>成功移动: ${data.data.moved}<br>跳过文件: ${data.data.skipped}<br>目标目录: ${data.data.targetDir}`, 'success');
                } else {
                    showStatus(`移动失败: ${data.data.message}`, 'error');
                }
            })
            .catch(error => {
                showStatus(`请求失败: ${error.message}`, 'error');
            })
            .finally(() => {
                moveBtn.disabled = false;
                moveBtn.textContent = '移动文件到images目录';
            });
        }
        
        // 清理images目录
        function cleanImages() {
            if (!confirm('确定要清理images目录中的所有文件吗？此操作不可恢复！')) {
                return;
            }
            
            const cleanBtn = document.getElementById('cleanBtn');
            cleanBtn.disabled = true;
            cleanBtn.textContent = '清理中...';
            showStatus('正在清理images目录...', 'info');
            
            fetch('/api/instagram/clean-images', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 0) {
                    showStatus(`清理完成！<br>已删除: ${data.data.deleted} 个文件`, 'success');
                } else {
                    showStatus(`清理失败: ${data.data.message}`, 'error');
                }
            })
            .catch(error => {
                showStatus(`请求失败: ${error.message}`, 'error');
            })
            .finally(() => {
                cleanBtn.disabled = false;
                cleanBtn.textContent = '清理images目录';
            });
        }
        
        // Facebook相关功能
        
        // 加载Facebook用户文件夹列表
        function loadFacebookUserFolders() {
            showStatus('正在加载用户文件夹列表...', 'info');
            
            fetch('/api/instagram/user-folders')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('facebookUserFolder');
                    select.innerHTML = '<option value="">-- 选择用户文件夹 --</option>';
                    
                    if (data.code === 0 && data.data.folders.length > 0) {
                        data.data.folders.forEach(folder => {
                            const option = document.createElement('option');
                            option.value = folder;
                            option.textContent = folder;
                            select.appendChild(option);
                        });
                        showStatus(`成功加载 ${data.data.folders.length} 个用户文件夹`, 'success');
                    } else {
                        showStatus('未找到用户文件夹', 'info');
                    }
                })
                .catch(error => {
                    showStatus(`加载失败: ${error.message}`, 'error');
                });
        }
        
        // 移动文件到Facebook目录
        function moveFilesToFacebook() {
            const username = document.getElementById('facebookUserFolder').value;
            
            if (!username) {
                showStatus('请选择用户文件夹', 'error');
                return;
            }
            
            const moveBtn = document.getElementById('facebookMoveBtn');
            moveBtn.disabled = true;
            moveBtn.textContent = '移动中...';
            showStatus('正在移动文件到Facebook目录...', 'info');
            
            fetch('/api/facebook/move-files', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username: username })
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 0) {
                    showStatus(`移动完成！<br>成功移动: ${data.data.moved}<br>跳过文件: ${data.data.skipped}<br>目标目录: ${data.data.targetDir}`, 'success');
                } else {
                    showStatus(`移动失败: ${data.data.message}`, 'error');
                }
            })
            .catch(error => {
                showStatus(`请求失败: ${error.message}`, 'error');
            })
            .finally(() => {
                moveBtn.disabled = false;
                moveBtn.textContent = '移动文件到Facebook目录';
            });
        }
        
        // 清理Facebook目录
        function cleanFacebookImages() {
            if (!confirm('确定要清理Facebook目录中的所有文件吗？此操作不可恢复！')) {
                return;
            }
            
            const cleanBtn = document.getElementById('facebookCleanBtn');
            cleanBtn.disabled = true;
            cleanBtn.textContent = '清理中...';
            showStatus('正在清理Facebook目录...', 'info');
            
            fetch('/api/facebook/clean-images', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 0) {
                    showStatus(`清理完成！<br>已删除: ${data.data.deleted} 个文件`, 'success');
                } else {
                    showStatus(`清理失败: ${data.data.message}`, 'error');
                }
            })
            .catch(error => {
                showStatus(`请求失败: ${error.message}`, 'error');
            })
            .finally(() => {
                cleanBtn.disabled = false;
                cleanBtn.textContent = '清理Facebook目录';
            });
        }
        
        // 页面加载时自动加载用户文件夹列表
        window.onload = function() {
            loadUserFolders();
            loadFacebookUserFolders();
        };
    </script>
</body>
</html>
