<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文生图 - Facebook管理系统</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .image-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
        }
        
        .image-section h3 {
            margin-bottom: 15px;
            color: #34495e;
        }
        
        .prompt-input {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            resize: vertical;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        
        .btn-generate {
            background-color: #007bff;
            color: white;
            font-size: 16px;
            padding: 12px 30px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .btn-generate:hover {
            background-color: #0056b3;
        }
        
        .btn-generate:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        
        .result-section {
            margin-top: 30px;
        }
        
        .image-preview {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        
        .image-preview img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .image-info {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        
        .info-item {
            margin-bottom: 10px;
        }
        
        .info-label {
            font-weight: 500;
            color: #6c757d;
            margin-right: 10px;
        }
        
        .info-value {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #2c3e50;
            word-break: break-all;
        }
        
        .api-key-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        
        .api-key-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .btn-save {
            background-color: #28a745;
            color: white;
            font-size: 14px;
            padding: 8px 20px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .btn-save:hover {
            background-color: #218838;
        }
        
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 动态加载的头部 -->
        <div id="app-header"></div>

        <main>
            <section class="image-manager">
                <h2>文生图</h2>
                
                <div style="display: flex; gap: 20px;">
                    <!-- 左边：输入区域和当前状态 -->
                    <div style="flex: 1;">
                        <div class="image-section">
                            <h3>生成图片</h3>
                            <textarea class="prompt-input" id="promptInput" placeholder="请输入图片描述提示词..."></textarea>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <input type="password" class="api-key-input" id="passwordInput" placeholder="请输入生成密码..." style="width: 200px;">
                                <button class="btn-generate" id="generateBtn" onclick="generateImage()">生成图片</button>
                            </div>
                        </div>

                        <div class="image-section">
                            <h3>qwen-image-2.0 API Key</h3>
                            <input type="text" class="api-key-input" id="apiKeyInput" placeholder="请输入API Key">
                            <p style="font-size: 14px; color: #6c757d; margin: 10px 0;">API Key将安全存储在本地文件中</p>
                            <button class="btn-save" onclick="saveApiKey()">保存API Key</button>
                            <div id="apiKeyMessage" class="message" style="display: none;"></div>
                            
                            <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 4px; border: 1px solid #e9ecef;">
                                <h4 style="margin-top: 0; margin-bottom: 15px; color: #34495e;">当前状态</h4>
                                <div class="status-item">
                                    <span class="status-label">API Key状态:</span>
                                    <span class="status-value" id="apiKeyStatus">--</span>
                                </div>
                                <div class="status-item">
                                    <span class="status-label">存储文件:</span>
                                    <span class="status-value">D:\weibo\user-config\assets\qwen-image-2.0key.txt</span>
                                </div>
                                <div class="status-item">
                                    <span class="status-label">最后修改:</span>
                                    <span class="status-value" id="apiKeyLastModified">--</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 右边：生成结果区域 -->
                    <div style="flex: 1;">
                        <!-- 生成结果区域 -->
                        <div class="image-section result-section" id="resultSection" style="height: 100%;">
                            <h3>生成结果</h3>
                            <div class="image-preview" style="height: calc(100% - 40px); display: flex; flex-direction: column;">
                                <img id="generatedImage" src="" alt="生成的图片" style="display: none; flex: 1; object-fit: contain; max-height: 100%;">
                                <div class="image-info">
                                    <div class="info-item">
                                        <span class="info-label">保存路径:</span>
                                        <span class="info-value" id="imagePath"></span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">图片URL:</span>
                                        <span class="info-value" id="imageUrl"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Facebook管理系统</p>
        </footer>
    </div>

    <script src="routes.js"></script>
    <script src="script.js"></script>
    <script>
        // 页面加载时读取API Key
        document.addEventListener('DOMContentLoaded', function() {
            loadApiKey();
        });

        // 加载API Key
        async function loadApiKey() {
            try {
                const response = await fetch('/api/image/api-key');
                const data = await response.json();
                
                if (data.success) {
                    if (data.data.apiKey) {
                        document.getElementById('apiKeyInput').value = data.data.apiKey;
                        document.getElementById('apiKeyStatus').textContent = '已配置';
                        document.getElementById('apiKeyStatus').className = 'status-value success';
                    } else {
                        document.getElementById('apiKeyStatus').textContent = '未配置';
                        document.getElementById('apiKeyStatus').className = 'status-value error';
                    }
                    
                    if (data.data.lastModified) {
                        document.getElementById('apiKeyLastModified').textContent = data.data.lastModified;
                    }
                }
            } catch (error) {
                console.error('加载API Key失败:', error);
            }
        }

        // 保存API Key
        async function saveApiKey() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const messageElement = document.getElementById('apiKeyMessage');
            
            if (!apiKey) {
                showMessage(messageElement, 'API Key不能为空', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/image/api-key', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ apiKey })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(messageElement, 'API Key保存成功', 'success');
                    // 重新加载API Key状态
                    await loadApiKey();
                } else {
                    showMessage(messageElement, data.message || '保存失败', 'error');
                }
            } catch (error) {
                showMessage(messageElement, '网络错误，请稍后重试', 'error');
                console.error('保存API Key失败:', error);
            }
        }

        // 生成图片
        async function generateImage() {
            const prompt = document.getElementById('promptInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const generateBtn = document.getElementById('generateBtn');
            
            if (!prompt) {
                alert('请输入图片描述提示词');
                return;
            }
            
            if (!password) {
                alert('请输入生成密码');
                return;
            }
            
            if (password !== '123') {
                alert('密码错误，生成图片失败');
                return;
            }
            
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="loading"></span>生成中...';
            
            try {
                const response = await fetch('/api/image/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 填充内容
                    document.getElementById('generatedImage').src = data.data.imageUrl;
                    document.getElementById('generatedImage').style.display = 'block';
                    document.getElementById('imagePath').textContent = data.data.imagePath;
                    document.getElementById('imageUrl').textContent = data.data.imageUrl;
                } else {
                    alert(data.message || '生成图片失败');
                }
            } catch (error) {
                alert('网络错误，请稍后重试');
                console.error('生成图片失败:', error);
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '生成图片';
            }
        }

        // 显示消息
        function showMessage(element, message, type) {
            element.textContent = message;
            element.className = `message ${type}`;
            element.style.display = 'block';
            
            // 3秒后自动隐藏
            setTimeout(() => {
                element.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
