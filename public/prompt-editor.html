<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提示词编辑 - Facebook管理系统</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .prompt-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
        }
        
        .prompt-section h3 {
            margin-bottom: 15px;
            color: #34495e;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            min-height: 200px;
            resize: vertical;
            transition: border-color 0.3s ease;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        
        .prompt-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-end;
        }
        
        .btn-save {
            background-color: #28a745;
            color: white;
        }
        
        .btn-save:hover {
            background-color: #218838;
        }
        
        .btn-reset {
            background-color: #6c757d;
            color: white;
        }
        
        .btn-reset:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 动态加载的头部 -->
        <div id="app-header"></div>

        <main>
            <section class="prompt-manager">
                <h2>提示词编辑</h2>
                
                <!-- 文件状态信息 -->
                <div class="status-section" style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e9ecef;">
                    <h3>文件状态</h3>
                    <p><strong>存储文件:</strong> <span id="filePath">加载中...</span></p>
                    <p><strong>最后修改:</strong> <span id="lastModified">加载中...</span></p>
                </div>
                
                <div class="prompt-section">
                    <h3>第一次探索提示词（热搜词探索）</h3>
                    <textarea id="explorerPrompt" placeholder="请输入第一次探索的提示词..."></textarea>
                    <div class="prompt-actions">
                        <button class="btn btn-save" onclick="saveExplorerPrompt()">保存</button>
                    </div>
                </div>

                <div class="prompt-section">
                    <h3>第二次探索提示词（热搜词二次交互）</h3>
                    <textarea id="interactPrompt" placeholder="请输入第二次探索的提示词..."></textarea>
                    <div class="prompt-actions">
                        <button class="btn btn-save" onclick="saveInteractPrompt()">保存</button>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Facebook管理系统</p>
        </footer>
    </div>

    <script src="routes.js"></script>
    <script src="script.js"></script>
    <script>
        // 提示词管理功能
        document.addEventListener('DOMContentLoaded', function() {
            loadPrompts();
            loadFileStatus();
        });
        
        // 加载文件状态
        async function loadFileStatus() {
            try {
                const response = await fetch('/api/prompts/status');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('filePath').textContent = data.data.filePath;
                    document.getElementById('lastModified').textContent = data.data.lastModified;
                } else {
                    document.getElementById('filePath').textContent = '文件不存在';
                    document.getElementById('lastModified').textContent = 'N/A';
                }
            } catch (error) {
                console.error('加载文件状态失败:', error);
                document.getElementById('filePath').textContent = '加载失败';
                document.getElementById('lastModified').textContent = '加载失败';
            }
        }

        // 加载提示词
        async function loadPrompts() {
            try {
                const response = await fetch('/api/prompts');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('explorerPrompt').value = data.data.explorerPrompt || '';
                    document.getElementById('interactPrompt').value = data.data.interactPrompt || '';
                } else {
                    showMessage('加载提示词失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error('加载提示词失败:', error);
            }
        }

        // 保存第一次探索提示词
        async function saveExplorerPrompt() {
            const prompt = document.getElementById('explorerPrompt').value.trim();
            
            try {
                const response = await fetch('/api/prompts/explorer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt })
                });
                const data = await response.json();
                
                if (data.success) {
                    showMessage('第一次探索提示词保存成功', 'success');
                    loadFileStatus(); // 更新文件状态
                } else {
                    showMessage(data.message || '保存失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error('保存提示词失败:', error);
            }
        }

        // 保存第二次探索提示词
        async function saveInteractPrompt() {
            const prompt = document.getElementById('interactPrompt').value.trim();
            
            try {
                const response = await fetch('/api/prompts/interact', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt })
                });
                const data = await response.json();
                
                if (data.success) {
                    showMessage('第二次探索提示词保存成功', 'success');
                    loadFileStatus(); // 更新文件状态
                } else {
                    showMessage(data.message || '保存失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error('保存提示词失败:', error);
            }
        }


    </script>
</body>
</html>
