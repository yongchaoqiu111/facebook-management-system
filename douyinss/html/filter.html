<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音过滤管理</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>抖音工程</h1>
        
        <!-- 动态加载导航 -->
        <div id="nav-container"></div>
        
        <!-- 关键词管理 -->
        <div style="margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 4px;">
            <h4>关键词管理</h4>
            <div style="margin-bottom: 15px;">
                <label>选择类别：</label>
                <select id="keywordCategorySelect" style="width: 100%; padding: 5px; margin-top: 5px;" onchange="loadKeywords()">
                    <option value="">-- 加载中 --</option>
                </select>
            </div>
            <div style="margin-bottom: 15px;">
                <label>添加关键词：</label>
                <input type="text" id="newKeyword" placeholder="输入关键词" style="width: 100%; padding: 5px; margin-top: 5px;">
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="button btn-success" onclick="addKeyword()" style="flex: 1;">添加</button>
                <button class="button btn-danger" onclick="clearKeywords()" style="flex: 1;">清空</button>
            </div>
            <div id="keywordsList" style="max-height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; background-color: white;">
                <p>加载中...</p>
            </div>
        </div>
        
        <!-- 归类管理 -->
        <div style="margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 4px;">
            <h4>归类管理</h4>
            <div style="margin-bottom: 15px;">
                <label>选择归类类别：</label>
                <select id="categorySelect" style="width: 100%; padding: 5px; margin-top: 5px;">
                    <option value="">-- 加载中 --</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="button btn-primary" onclick="classifyContent()" style="flex: 1;">执行归类</button>
                <button class="button btn-info" onclick="addCustomCategory()" style="flex: 1;">添加自定义类别</button>
            </div>
        </div>
        
        <!-- 启动过滤按钮 -->
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="button btn-info" onclick="startFilter()" style="flex: 1;">启动过滤</button>
            <button class="button btn-warning" onclick="clearFilterResults()" style="flex: 1;">清空筛选评论</button>
        </div>
        
        <!-- 过滤执行状态 -->
        <div style="margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 4px;">
            <h4>过滤执行状态</h4>
            <div style="margin-bottom: 10px;">
                <label>当前状态：</label>
                <span id="filterStatus" style="font-weight: bold; color: #6c757d;">未开始</span>
            </div>
            <div style="margin-bottom: 10px;">
                <label>当前动作：</label>
                <span id="filterAction" style="font-weight: bold; color: #007bff;">等待开始</span>
            </div>
            <div style="margin-bottom: 10px;">
                <label>用户总数：</label>
                <span id="filterTotalUsers">0</span>
            </div>
            <div style="margin-bottom: 10px;">
                <label>过滤完总数：</label>
                <span id="filterResultCount">0</span>
            </div>
        </div>
        
        <!-- 消息提示 -->
        <div id="message" class="message" style="display: none;"></div>
    </div>

    <script>
        // 定时刷新状态的定时器
        let statusUpdateInterval = null;
        let filterWordCategories = {}; // 过滤词分类
        
        // 页面加载时执行
        window.onload = async function() {
            loadNavigation();
            
            // 获取初始化数据
            await loadInitialData();
            
            loadKeywords();
            getFilterStatus();
            
            // 启动定时刷新（每3秒刷新一次）
            startStatusUpdate();
        };
        
        // 获取初始化数据
        async function loadInitialData() {
            try {
                const response = await fetch('/api/initial-data');
                const data = await response.json();
                if (data.success) {
                    console.log('已加载初始化数据:', data.data);
                    filterWordCategories = data.data.filterWordCategories;
                    loadFilterWordCategories();
                } else {
                    console.error('获取初始化数据失败:', data.error);
                }
            } catch (error) {
                console.error('加载初始化数据出错:', error);
            }
        }
        
        // 加载过滤词分类到下拉框
        function loadFilterWordCategories() {
            const keywordCategorySelect = document.getElementById('keywordCategorySelect');
            const categorySelect = document.getElementById('categorySelect');
            
            // 清空现有选项
            keywordCategorySelect.innerHTML = '<option value="">-- 请选择类别 --</option>';
            categorySelect.innerHTML = '<option value="">-- 请选择类别 --</option>';
            
            // 添加新选项
            Object.keys(filterWordCategories).forEach(category => {
                // 关键词管理下拉框
                const keywordOption = document.createElement('option');
                keywordOption.value = category;
                keywordOption.textContent = category;
                keywordCategorySelect.appendChild(keywordOption);
                
                // 归类管理下拉框
                const categoryOption = document.createElement('option');
                categoryOption.value = category;
                categoryOption.textContent = category;
                categorySelect.appendChild(categoryOption);
            });
        }
        
        // 加载导航
        function loadNavigation() {
            fetch('nav.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('nav-container').innerHTML = data;
                    // 设置当前页面的导航链接为活动状态
                    const currentPage = window.location.pathname.split('/').pop();
                    const navLinks = document.querySelectorAll('.nav-link');
                    navLinks.forEach(link => {
                        if (link.href.includes(currentPage)) {
                            link.style.color = '#007bff';
                        }
                    });
                })
                .catch(error => {
                    console.error('加载导航失败:', error);
                });
        }
        
        // 显示消息
        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // 3秒后自动隐藏
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
        
        // 加载关键词列表
        function loadKeywords() {
            const category = document.getElementById('keywordCategorySelect').value;
            fetch(`http://localhost:3001/get-keywords?category=${category}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        renderKeywords(data.data.keywords);
                    } else {
                        showMessage('加载关键词失败: ' + data.error, 'error');
                    }
                })
                .catch(error => {
                    showMessage('加载关键词失败: ' + error.message, 'error');
                });
        }
        
        // 渲染关键词列表
        function renderKeywords(keywords) {
            const keywordsList = document.getElementById('keywordsList');
            if (keywords.length === 0) {
                keywordsList.innerHTML = '<p style="color: #666;">暂无关键词</p>';
                return;
            }
            
            keywordsList.innerHTML = keywords.map((keyword, index) => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 5px; border-bottom: 1px solid #eee;">
                    <span>${keyword}</span>
                    <button class="button btn-danger" onclick="deleteKeyword('${keyword}')" style="padding: 2px 8px; font-size: 12px;">删除</button>
                </div>
            `).join('');
        }
        
        // 添加关键词
        function addKeyword() {
            const newKeyword = document.getElementById('newKeyword').value.trim();
            if (!newKeyword) {
                showMessage('请输入关键词', 'error');
                return;
            }
            
            const category = document.getElementById('keywordCategorySelect').value;
            
            fetch('http://localhost:3001/add-keyword', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ keyword: newKeyword, category: category })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showMessage('关键词添加成功', 'success');
                        document.getElementById('newKeyword').value = '';
                        loadKeywords();
                    } else {
                        showMessage('添加关键词失败: ' + data.error, 'error');
                    }
                })
                .catch(error => {
                    showMessage('添加关键词失败: ' + error.message, 'error');
                });
        }
        
        // 删除关键词
        function deleteKeyword(keyword) {
            if (!confirm(`确定要删除关键词"${keyword}"吗？`)) {
                return;
            }
            
            const category = document.getElementById('keywordCategorySelect').value;
            
            fetch('http://localhost:3001/delete-keyword', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ keyword: keyword, category: category })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showMessage('关键词删除成功', 'success');
                        loadKeywords();
                    } else {
                        showMessage('删除关键词失败: ' + data.error, 'error');
                    }
                })
                .catch(error => {
                    showMessage('删除关键词失败: ' + error.message, 'error');
                });
        }
        
        // 清空关键词
        function clearKeywords() {
            const category = document.getElementById('keywordCategorySelect').value;
            
            if (!confirm(`确定要清空${document.getElementById('keywordCategorySelect').options[document.getElementById('keywordCategorySelect').selectedIndex].text}类别的所有关键词吗？`)) {
                return;
            }
            
            fetch('http://localhost:3001/clear-keywords', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ category: category })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showMessage('关键词已清空', 'success');
                        loadKeywords();
                    } else {
                        showMessage('清空关键词失败: ' + data.error, 'error');
                    }
                })
                .catch(error => {
                    showMessage('清空关键词失败: ' + error.message, 'error');
                });
        }
        
        // 启动过滤
        function startFilter() {
            const category = document.getElementById('keywordCategorySelect').value;
            const categoryName = document.getElementById('keywordCategorySelect').options[document.getElementById('keywordCategorySelect').selectedIndex].text;
            
            showMessage(`正在使用${categoryName}关键词启动过滤功能...`, 'success');
            updateFilterStatus({ status: 'running', currentAction: `正在使用${categoryName}关键词执行过滤...` });
            
            // 通过调用Node.js脚本来启动过滤，传递类别参数
            fetch('http://localhost:3001/start-filter', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ category: category })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showMessage(`过滤功能已启动，正在使用${categoryName}关键词执行...`, 'success');
                    } else {
                        showMessage('启动过滤失败: ' + data.error, 'error');
                        updateFilterStatus({ status: 'failed', currentAction: '启动失败' });
                    }
                })
                .catch(error => {
                    showMessage('启动过滤失败: ' + error.message, 'error');
                    updateFilterStatus({ status: 'failed', currentAction: '启动失败' });
                });
        }
        
        // 获取过滤状态
        function getFilterStatus() {
            fetch('http://localhost:3001/get-filter-status')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        updateFilterStatus(data.data);
                    } else {
                        console.error('获取过滤状态失败:', data.error);
                    }
                })
                .catch(error => {
                    console.error('获取过滤状态失败:', error);
                });
        }
        
        // 更新过滤状态显示
        function updateFilterStatus(status) {
            document.getElementById('filterStatus').textContent = status.status || '未开始';
            document.getElementById('filterAction').textContent = status.currentAction || '等待开始';
            document.getElementById('filterTotalUsers').textContent = status.totalUsers || '0';
            document.getElementById('filterResultCount').textContent = status.resultCount || '0';
            
            // 根据状态更新颜色
            const statusElement = document.getElementById('filterStatus');
            if (status.status === '运行中') {
                statusElement.style.color = '#28a745'; // 绿色
            } else if (status.status === '已完成') {
                statusElement.style.color = '#007bff'; // 蓝色
            } else {
                statusElement.style.color = '#6c757d'; // 灰色
            }
        }
        
        // 开始定时更新状态
        function startStatusUpdate() {
            if (statusUpdateInterval) {
                clearInterval(statusUpdateInterval);
            }
            statusUpdateInterval = setInterval(getFilterStatus, 3000); // 每3秒更新一次
        }
        
        // 停止定时更新状态
        function stopStatusUpdate() {
            if (statusUpdateInterval) {
                clearInterval(statusUpdateInterval);
                statusUpdateInterval = null;
            }
        }
        
        // 清空筛选评论
        function clearFilterResults() {
            if (confirm('确定要清空筛选评论吗？此操作不可恢复！')) {
                showMessage('正在清空筛选评论...', 'info');
                
                fetch('http://localhost:3001/clear-filter-results', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showMessage('筛选评论已清空', 'success');
                        getFilterStatus(); // 刷新状态
                    } else {
                        showMessage('清空失败: ' + data.error, 'error');
                    }
                })
                .catch(error => {
                    showMessage('清空失败: ' + error.message, 'error');
                });
            }
        }
        
        // 执行归类
        function classifyContent() {
            const category = document.getElementById('categorySelect').value;
            if (!category) {
                showMessage('请选择归类类别', 'error');
                return;
            }
            
            const categoryName = document.getElementById('categorySelect').options[document.getElementById('categorySelect').selectedIndex].text;
            
            if (confirm(`确定要将所有内容归类到${categoryName}吗？`)) {
                showMessage(`正在归类到${categoryName}...`, 'info');
                
                fetch('http://localhost:3001/classify-content', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ category: category })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showMessage(`归类到${categoryName}成功`, 'success');
                        getFilterStatus(); // 刷新状态
                    } else {
                        showMessage('归类失败: ' + data.error, 'error');
                    }
                })
                .catch(error => {
                    showMessage('归类失败: ' + error.message, 'error');
                });
            }
        }
        
        // 添加自定义类别
        function addCustomCategory() {
            const customCategory = prompt('请输入自定义类别名称：');
            if (!customCategory || customCategory.trim() === '') {
                showMessage('类别名称不能为空', 'error');
                return;
            }
            
            const select = document.getElementById('categorySelect');
            const option = document.createElement('option');
            option.value = customCategory.toLowerCase().replace(/\s+/g, '_');
            option.textContent = customCategory;
            select.appendChild(option);
            
            showMessage('自定义类别添加成功', 'success');
        }
    </script>
</body>
</html>
