<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹幕抓取工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>增强版弹幕抓取工具 (Puppeteer)</h1>
        
        <!-- 动态加载导航 -->
        <div id="nav-container"></div>

        <!-- 直播间管理区 -->
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <input type="text" id="liveRoomIdInput" placeholder="输入直播间ID或链接" style="flex: 1; padding: 10px;">
            <button class="button btn-primary" onclick="addRoom()">➕ 添加</button>
            <button class="button btn-secondary" onclick="toggleSettings()">⚙️ 设置</button>
        </div>

        <!-- 已添加直播间列表 -->
        <div id="roomListContainer" style="margin-top: 15px; border: 1px solid #eee; padding: 10px; max-height: 150px; overflow-y: auto;"></div>

        <!-- 操作按钮 -->
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="button btn-success" onclick="startBatchCapture()" style="flex: 1;">🚀 开始批量抓取</button>
            <button class="button btn-danger" onclick="stopCapture()" style="flex: 1;">⏹️ 停止抓取</button>
        </div>

        <!-- 设置面板 (默认隐藏) -->
        <div id="settingsPanel" style="display: none; margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px;">
            <h4>抓取设置</h4>
            <div style="margin-bottom: 10px;">
                <label>关键词超时时间 (秒): </label>
                <input type="number" id="keywordTimeout" value="180" style="width: 80px; padding: 5px;">
            </div>
            <div style="margin-bottom: 10px;">
                <label>过滤词类目: </label>
                <select id="filterCategory" onchange="loadFilterWords()" style="padding: 5px; width: 100%;">
                    <option value="">-- 请选择 --</option>
                </select>
            </div>
            <div style="margin-bottom: 10px;">
                <label>过滤词 (默认全选): </label>
                <select id="filterWords" multiple style="width: 100%; height: 100px; padding: 5px;"></select>
            </div>
            <button class="button btn-primary" onclick="saveSettings()">保存设置</button>
        </div>

        <!-- 状态显示 -->
        <div class="status-panel" style="margin-top: 20px;">
            <h4>当前状态</h4>
            <div class="status-item"><span class="status-label">状态:</span><span id="captureStatus" class="status-value">未运行</span></div>
            <div class="status-item"><span class="status-label">当前房间:</span><span id="currentRoom" class="status-value">无</span></div>
            <div class="status-item"><span class="status-label">已捕获:</span><span id="danmakuCount" class="status-value">0</span></div>
        </div>

        <!-- 实时弹幕区 -->
        <div class="danmaku-container" style="margin-top: 20px;">
            <h3>实时弹幕</h3>
            <div id="danmakuDisplay" style="border: 1px solid #ddd; height: 300px; overflow-y: auto; padding: 10px; background: #fff;"></div>
        </div>

        <div id="message" class="message" style="display: none;"></div>
    </div>

    <script>
        let rooms = [];
        let captureRunning = false;
        let currentRoomIndex = 0;
        let settings = { keywordTimeout: 180, filterWords: [] };
        let statusInterval = null;
        let filterWordCategories = {}; // 存储所有类目的关键词
        let ws = null; // WebSocket 连接

        window.onload = function() {
            loadNavigation();
            loadInitialData(); // 统一加载设置和关键词
            loadRooms();
            initWebSocket(); // 初始化 WebSocket
        };

        function loadNavigation() {
            fetch('nav.html').then(r => r.text()).then(d => document.getElementById('nav-container').innerHTML = d);
        }

        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg; el.className = `message ${type}`; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        // --- 房间管理逻辑 ---
        function addRoom() {
            const input = document.getElementById('liveRoomIdInput');
            let val = input.value.trim();
            if (!val) return showMessage('请输入直播间ID或链接', 'error');
            
            // 如果是链接，尝试提取 ID
            if (val.includes('douyin.com')) {
                const match = val.match(/(\d{10,})/);
                if (match) val = match[1];
            }

            if (rooms.some(r => r.id === val)) return showMessage('该房间已存在', 'error');
            
            rooms.push({ id: val, status: '等待中' });
            updateRoomList();
            saveRooms();
            input.value = '';
        }

        function deleteRoom(id) {
            rooms = rooms.filter(r => r.id !== id);
            updateRoomList();
            saveRooms();
        }

        function updateRoomList() {
            const container = document.getElementById('roomListContainer');
            container.innerHTML = rooms.map((r, i) => `
                <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee;">
                    <span>${i+1}. ${r.id} [${r.status}]</span>
                    <button onclick="deleteRoom('${r.id}')" style="color:red; border:none; background:none; cursor:pointer;">删除</button>
                </div>
            `).join('');
        }

        async function saveRooms() {
            await fetch('/api/save-live-rooms', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ rooms })
            });
        }

        async function loadRooms() {
            const res = await fetch('/api/get-live-rooms');
            const data = await res.json();
            if (data.success) {
                rooms = data.data || [];
                
                // 【修复】检查后端是否真的在运行
                const statusRes = await fetch('/api/danmaku/status');
                const statusData = await statusRes.json();
                if (statusData.success && statusData.data.status === 'stopped') {
                    // 后端没在运行，重置所有房间状态为"等待中"
                    rooms.forEach(r => {
                        if (r.status !== '等待中' && r.status !== '已结束/超时') {
                            r.status = '等待中';
                        }
                    });
                    // 保存重置后的状态
                    await saveRooms();
                }
                
                updateRoomList();
            }
        }

        // --- 设置逻辑 ---
        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        async function loadInitialData() {
            try {
                const res = await fetch('/api/initial-data');
                const data = await res.json();
                if (data.success) {
                    filterWordCategories = data.data.filterWordCategories;
                    settings = data.data.settings;
                    
                    // 填充超时时间
                    document.getElementById('keywordTimeout').value = settings.keywordTimeout;
                    
                    // 填充类目下拉框
                    const categorySelect = document.getElementById('filterCategory');
                    categorySelect.innerHTML = '<option value="">-- 请选择类目 --</option>';
                    for (const category in filterWordCategories) {
                        const option = document.createElement('option');
                        option.value = category;
                        option.textContent = category;
                        categorySelect.appendChild(option);
                    }
                }
            } catch (error) {
                console.error('加载初始化数据失败:', error);
            }
        }

        function loadFilterWords() {
            const category = document.getElementById('filterCategory').value;
            const wordSelect = document.getElementById('filterWords');
            wordSelect.innerHTML = '';
            
            if (category && filterWordCategories[category]) {
                const words = filterWordCategories[category];
                words.forEach(word => {
                    const option = document.createElement('option');
                    option.value = word;
                    option.textContent = word;
                    option.selected = true; // 默认全选
                    wordSelect.appendChild(option);
                });
            }
        }

        async function saveSettings() {
            const timeout = parseInt(document.getElementById('keywordTimeout').value);
            
            // 获取所有选中的过滤词
            const wordSelect = document.getElementById('filterWords');
            const selectedWords = Array.from(wordSelect.options).filter(o => o.selected).map(o => o.value);
            
            settings.keywordTimeout = timeout;
            settings.filterWords = selectedWords;

            await fetch('/api/settings', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(settings)
            });
            showMessage('设置已保存，关键词已同步到后端', 'success');
            toggleSettings();
        }

        // --- 抓取控制逻辑 ---
        function startBatchCapture() {
            if (rooms.length === 0) return showMessage('请先添加直播间', 'error');
            captureRunning = true;
            currentRoomIndex = 0;
            updateStatus('running');
            processNextRoom();
        }

        function stopCapture() {
            captureRunning = false;
            updateStatus('stopped');
            fetch('/api/danmaku/stop', { method: 'POST' });
            showMessage('已发送停止指令', 'info');
        }

        async function processNextRoom() {
            if (!captureRunning || currentRoomIndex >= rooms.length) {
                stopCapture();
                return;
            }

            const room = rooms[currentRoomIndex];
            
            // 【核心修复】同时更新列表状态和顶部主状态面板
            room.status = '正在抓取中...';
            updateRoomList();
            
            document.getElementById('currentRoom').textContent = room.id;
            updateStatus('running'); // 强制更新顶部状态为绿色运行中
            document.getElementById('danmakuCount').textContent = '0'; // 重置计数

            // 调用原有的 Puppeteer 接口
            try {
                const res = await fetch('/api/danmaku/start', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ roomUrl: `https://live.douyin.com/${room.id}` })
                });
                const data = await res.json();
                
                if (data.success) {
                    console.log(`✅ 直播间 ${room.id} 启动成功`);
                    startMonitoring(room.id);
                } else {
                    throw new Error(data.error);
                }
            } catch (e) {
                console.error(e);
                room.status = '启动失败';
                updateRoomList();
                showMessage(`房间 ${room.id} 启动失败: ${e.message}`, 'error');
                currentRoomIndex++;
                setTimeout(processNextRoom, 2000);
            }
        }

        function startMonitoring(roomId) {
            if (statusInterval) clearInterval(statusInterval);
            statusInterval = setInterval(async () => {
                if (!captureRunning) return;
                
                const res = await fetch('/api/danmaku/status');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('danmakuCount').textContent = data.data.danmakuCount || 0;
                    // 简单的结束判断：如果状态变为 stopped 且没有错误，尝试下一个
                    if (data.data.status === 'stopped') {
                        clearInterval(statusInterval); // 清除当前监控
                        rooms[currentRoomIndex].status = '已结束/超时';
                        updateRoomList();
                        currentRoomIndex++;
                        console.log(`🔄 切换到下一个房间，索引: ${currentRoomIndex}`);
                        setTimeout(processNextRoom, 1000);
                    }
                }
            }, 2000);
        }

        function updateStatus(state) {
            document.getElementById('captureStatus').textContent = state === 'running' ? '运行中' : '已停止';
            document.getElementById('captureStatus').style.color = state === 'running' ? '#28a745' : '#6c757d';
        }

        // --- WebSocket 实时推送逻辑 ---
        function initWebSocket() {
            ws = new WebSocket('ws://localhost:3002/ws/client');
            
            ws.onopen = () => console.log('✅ WebSocket 已连接');
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'chat' || data.type === 'danmaku') {
                        displayDanmaku(data);
                    }
                } catch (e) { console.error(e); }
            };

            ws.onclose = () => setTimeout(initWebSocket, 3000); // 断线重连
        }

        function displayDanmaku(data) {
            const display = document.getElementById('danmakuDisplay');
            const div = document.createElement('div');
            div.style.padding = '5px';
            div.style.borderBottom = '1px solid #eee';
            div.innerHTML = `<strong style="color:#007bff">${data.user_name || data.user?.nickname}</strong>: ${data.content}`;
            
            // 如果是关键词命中，加个标记
            if (data.contains_keyword) {
                div.innerHTML += ` <span style="color:red; font-size:12px;">[命中]</span>`;
                div.style.backgroundColor = '#fff3cd';
            }

            display.appendChild(div);
            display.scrollTop = display.scrollHeight; // 自动滚到底部
            
            // 更新计数
            const countEl = document.getElementById('danmakuCount');
            countEl.textContent = parseInt(countEl.textContent) + 1;
        }
    </script>
</body>
</html>
