<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论抓取工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>评论抓取工具</h1>
        
        <!-- 动态加载导航 -->
        <div id="nav-container"></div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="button btn-danger" onclick="startCapture()" style="flex: 1;">
                🚀 启动评论抓取工具
            </button>
            <button class="button btn-warning" onclick="clearAllComments()" style="flex: 1;">
                🗑️ 清空全部评论
            </button>
        </div>
        
        <div class="status-panel">
            <h4>操作说明</h4>
            <ul>
                <li>点击"启动评论抓取工具"按钮</li>
                <li>系统会自动打开抖音并导航到指定目录</li>
                <li>在新打开的终端窗口中，程序会自动输入：</li>
                <ul>
                    <li><code>d:</code></li>
                    <li><code>cd \weibo\douyinss\js</code></li>
                    <li><code>node c.js</code></li>
                </ul>
                <li>请在新窗口中按照提示操作：</li>
                <ul>
                    <li>登录抖音（按回车继续）</li>
                    <li>搜索关键词，刷视频</li>
                    <li>点进想抓的视频，按回车抓取评论</li>
                    <li>输入 "exit" 退出程序</li>
                </ul>
            </ul>
        </div>
        
        <div id="message" class="message" style="display: none;"></div>
    </div>

    <script>
        // 页面加载时执行
        window.onload = function() {
            loadNavigation();
        };
        
        // 加载导航
        function loadNavigation() {
            fetch('nav.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('nav-container').innerHTML = data;
                    // 设置当前页面的导航链接为活动状态
                    const currentPage = window.location.pathname.split('/').pop();
                    const navLinks = document.querySelectorAll('.nav-link');
                    navLinks.forEach(link => {
                        if (link.href.includes(currentPage)) {
                            link.style.color = '#007bff';
                        }
                    });
                })
                .catch(error => {
                    console.error('加载导航失败:', error);
                });
        }
        
        // 显示消息
        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // 3秒后自动隐藏
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
        
        // 启动评论抓取工具
        function startCapture() {
            showMessage('正在启动评论抓取工具...', 'info');
            
            // 调用后端接口启动 c.js
            fetch('http://localhost:3001/start-capture', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('评论抓取工具已启动，请在新窗口中操作', 'success');
                } else {
                    showMessage('启动失败: ' + data.error, 'error');
                }
            })
            .catch(error => {
                showMessage('启动失败: ' + error.message, 'error');
            });
        }
        
        // 清空全部评论
        function clearAllComments() {
            if (confirm('确定要清空全部评论吗？此操作不可恢复！')) {
                showMessage('正在清空全部评论...', 'info');
                
                fetch('http://localhost:3001/clear-all-comments', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showMessage('全部评论已清空', 'success');
                    } else {
                        showMessage('清空失败: ' + data.error, 'error');
                    }
                })
                .catch(error => {
                    showMessage('清空失败: ' + error.message, 'error');
                });
            }
        }
    </script>
</body>
</html>
