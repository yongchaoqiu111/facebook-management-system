<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>前后端AI协作看板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .header {
      background: white;
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    .header h1 {
      color: #667eea;
      margin-bottom: 10px;
    }
    
    .status-bar {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }
    
    .status-item {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }
    
    .status-item.frontend {
      background: #e3f2fd;
      border-left: 4px solid #2196f3;
    }
    
    .status-item.backend {
      background: #f3e5f5;
      border-left: 4px solid #9c27b0;
    }
    
    .status-item.active {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    
    .panel {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-height: 70vh;
      overflow-y: auto;
    }
    
    .panel h2 {
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #eee;
    }
    
    .message {
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      position: relative;
    }
    
    .message.frontend {
      background: #e3f2fd;
      border-left: 4px solid #2196f3;
    }
    
    .message.backend {
      background: #f3e5f5;
      border-left: 4px solid #9c27b0;
    }
    
    .message-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 12px;
      color: #666;
    }
    
    .message-content {
      line-height: 1.6;
      white-space: pre-wrap;
    }
    
    .todo-list {
      list-style: none;
    }
    
    .todo-item {
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .todo-item.pending {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
    }
    
    .todo-item.completed {
      background: #d4edda;
      border-left: 4px solid #28a745;
    }
    
    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
    }
    
    .refresh-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #667eea;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      transition: all 0.3s;
    }
    
    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
    }
    
    .timestamp {
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 前后端AI协作看板</h1>
      <p style="color: #666;">实时监控前后端AI的沟通进展</p>
      
      <div class="status-bar">
        <div class="status-item frontend" id="frontendStatus">
          <h3>🔵 前端AI</h3>
          <p id="frontendLastUpdate">最后更新: --</p>
          <p id="frontendStatusText">状态: 等待中</p>
        </div>
        <div class="status-item backend" id="backendStatus">
          <h3>🟣 后端AI</h3>
          <p id="backendLastUpdate">最后更新: --</p>
          <p id="backendStatusText">状态: 等待中</p>
        </div>
      </div>
    </div>
    
    <div class="main-content">
      <div class="panel">
        <h2>💬 沟通记录</h2>
        <div id="messages"></div>
      </div>
      
      <div class="panel">
        <h2>✅ 任务清单</h2>
        <ul class="todo-list" id="todoList"></ul>
      </div>
    </div>
  </div>
  
  <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
  
  <script>
    let lastFrontendUpdate = null;
    let lastBackendUpdate = null;
    
    async function loadFile(path) {
      try {
        const response = await fetch(path);
        return await response.text();
      } catch (error) {
        console.error(`加载 ${path} 失败:`, error);
        return '';
      }
    }
    
    function parseMessages(content, sender) {
      if (!content.trim()) return [];
      
      const sections = content.split('##').filter(s => s.trim());
      const messages = [];
      
      sections.forEach(section => {
        const lines = section.split('\n').filter(l => l.trim());
        if (lines.length > 0) {
          const title = lines[0].replace(/#/g, '').trim();
          const body = lines.slice(1).join('\n').trim();
          
          if (body) {
            messages.push({
              title,
              content: body,
              sender,
              timestamp: new Date().toLocaleString('zh-CN')
            });
          }
        }
      });
      
      return messages;
    }
    
    function parseTodos(content) {
      const todos = [];
      const lines = content.split('\n');
      
      lines.forEach(line => {
        if (line.includes('- [ ]') || line.includes('- [x]')) {
          const completed = line.includes('[x]');
          const text = line.replace(/- \[[ x]\]/, '').trim();
          todos.push({ text, completed });
        }
      });
      
      return todos;
    }
    
    async function loadData() {
      console.log('加载数据...');
      
      // 加载前端文件
      const frontendContent = await loadFile('/A.md');
      const frontendMessages = parseMessages(frontendContent, 'frontend');
      const frontendTodos = parseTodos(frontendContent);
      
      // 加载后端文件（模拟，实际需要从后端项目加载）
      const backendContent = ''; // 这里需要从后端项目加载
      const backendMessages = parseMessages(backendContent, 'backend');
      
      // 更新状态
      if (frontendContent && frontendContent !== lastFrontendUpdate) {
        document.getElementById('frontendStatus').classList.add('active');
        document.getElementById('frontendLastUpdate').textContent = 
          '最后更新: ' + new Date().toLocaleTimeString('zh-CN');
        document.getElementById('frontendStatusText').textContent = '状态: 已更新';
        lastFrontendUpdate = frontendContent;
        
        setTimeout(() => {
          document.getElementById('frontendStatus').classList.remove('active');
        }, 2000);
      }
      
      // 显示消息
      const messagesDiv = document.getElementById('messages');
      const allMessages = [...frontendMessages, ...backendMessages].sort((a, b) => 
        new Date(b.timestamp) - new Date(a.timestamp)
      );
      
      messagesDiv.innerHTML = allMessages.map(msg => `
        <div class="message ${msg.sender}">
          <div class="message-header">
            <strong>${msg.sender === 'frontend' ? '🔵 前端AI' : '🟣 后端AI'}</strong>
            <span class="timestamp">${msg.timestamp}</span>
          </div>
          <h3 style="margin-bottom: 10px;">${msg.title}</h3>
          <div class="message-content">${msg.content}</div>
        </div>
      `).join('');
      
      // 显示任务清单
      const todoList = document.getElementById('todoList');
      todoList.innerHTML = frontendTodos.map(todo => `
        <li class="todo-item ${todo.completed ? 'completed' : 'pending'}">
          <input type="checkbox" ${todo.completed ? 'checked' : ''} disabled>
          <span>${todo.text}</span>
        </li>
      `).join('');
    }
    
    // 初始加载
    loadData();
    
    // 自动刷新（每30秒）
    setInterval(loadData, 30000);
  </script>
</body>
</html>
